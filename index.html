<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1d3a8a" />
  <script>
    /* Apply saved/system theme before first paint to avoid a flash of the wrong theme. */
    (function () {
      try {
        var saved = localStorage.getItem('kiip_theme');
        var sysDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', saved || (sysDark ? 'dark' : 'light'));
      } catch (e) {}
    })();
  </script>
  <title>Study KIIP — Korean for Immigrants</title>
  <meta name="description" content="Study KIIP: level- and chapter-wise Korean lessons, flashcards, quizzes and search for the Social Integration Program (사회통합프로그램)." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="topbar">
    <button class="brand" id="homeBtn" aria-label="Go home">
      <span class="brand-mark">한</span>
      <span class="brand-text">Study <strong>KIIP</strong></span>
    </button>

    <div class="search-wrap">
      <input id="searchInput" type="search" placeholder="Search words, grammar, meanings…" autocomplete="off" />
      <div id="searchResults" class="search-results" hidden></div>
    </div>

    <nav class="top-nav" id="topNav"></nav>

    <div class="lang-wrap">
      <span class="lang-fixed" title="Korean + English are always shown">KO·EN +</span>
      <select id="langSelect" aria-label="Translation language"></select>
    </div>

    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle day/night theme" aria-pressed="false" title="Toggle theme">
      <span class="theme-icon" aria-hidden="true">🌙</span>
    </button>
  </header>

  <main id="view" class="view"></main>

  <footer class="footer">
    <span>Study KIIP · 사회통합프로그램 학습 도우미</span>
    <span class="footer-sep">·</span>
    <span>Korean · English · नेपाली</span>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/ui-i18n.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/translations-gen.js"></script>
  <script src="js/lessons-data.js"></script>
  <script src="js/render-lesson.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
